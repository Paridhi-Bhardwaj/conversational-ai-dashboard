kind = "web"
previewPath = "/"
title = "AI Dashboard Generator"
version = "1.0.0"
id = "artifacts/ai-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20060
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ai-dashboard run dev"

[services.env]
PORT = "20060"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ai-dashboard", "run", "build"]
publicDir = "artifacts/ai-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
